<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>史莱姆养成物语</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="resource">
                <span class="icon">🪙</span>
                <span id="coins">0</span>
            </div>
            <div class="resource">
                <span class="icon">💎</span>
                <span id="gems">0</span>
            </div>
        </header>

        <main>
            <div class="slime-container">
                <div id="slime" class="slime normal"></div>
                <div id="slime-name">果冻史莱姆 (Lv.1)</div>
            </div>

            <div class="stats-card">
                <div class="stat-row">
                    <span>经验值 (EXP)</span>
                    <span id="exp-text">0 / 100</span>
                </div>
                <div class="progress-bar">
                    <div id="exp-fill" class="fill exp-fill"></div>
                </div>

                <div class="stat-row">
                    <span>体力 (Stamina)</span>
                    <span id="stamina-text">10 / 10</span>
                </div>
                <div class="progress-bar">
                    <div id="stamina-fill" class="fill stamina-fill"></div>
                </div>
            </div>

            <div class="actions">
                <button id="btn-feed" class="btn primary">
                    投喂 (消耗1体力)
                </button>
                <!-- 预留的商业化广告位 -->
                <button id="btn-ad-stamina" class="btn ad">
                    📺 看广告回满体力
                </button>
            </div>

            <div class="log-container">
                <div id="log" class="log-list">
                    <div class="log-item system">欢迎来到史莱姆农场！</div>
                </div>
            </div>
        </main>
    </div>

    <script src="game.js"></script>
</body>
</html>
